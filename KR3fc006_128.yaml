body:
  text: 上方也合問假令有粟二萬六千三百四十二石四斗欲作方窖六圓窖四令口小底大方面與圓徑等其深亦同令深少於下方七尺多於上方一丈四尺盛各滿中而粟適盡圓率斛法竝與前同問上下方深數各多少答曰方窖上方七尺下方二丈八尺深二丈一尺圓窖上下徑深與方窖同術曰以四十二乘斛法以乘粟三百八十四而一為方亭積尺令方差自乘三而一為隅陽羃以截多乘之以減積餘為實以多乘差加羃為方法又以多加差為廉法從開立方除之即上方加差即合所問今以四十二乘圓虛十一者四方虛十四者六合一百二十八虛除之為一虛之積得者仍三而一為方亭實積乃依方亭見差覆問求之故三乘一百二十八除之
  hash: sha256:961274d8940929c9cdbd669365908596bb86b23e5df0c45a950e3afb7b932eb2

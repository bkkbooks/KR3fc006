body:
  text: 二十五而一為實又倍多加少以乘少數又十一乘之二十五而一多自乘加之為方法又倍少數十一乘之二十五而一又倍多加之為廉法從開立方除之即高深各加差即方徑一十四乘斛法以乘粟為積尺前一十四除今還元一十四乘為徑自乘者是一十一方自乘者是一十四故并之為二十五凡此方圓二徑長短不同二徑各自乘為方大小各別然則此塹方二丈九尺八寸塹徑三丈七寸皆成立方此應塹方自乘一十四乘之塹徑自乘一十一乘之二十五而一為隅羃即方法也但二隅方皆以塹數為方面今此術就省倍小隅方加差為短以差乘之為短羃一十一乘之二十五而一又小隅方自乘之數即是方圓之隅同有此數若二十五乘之還須二十五除直以小隅方自乘加之故不復乘除又須倍二廉之差一十一乘之二十五而一倍二廉加之故為廉法不復二十五乘除之也草曰立天元一為高又為深加方面多於高二百九十八寸得為方面又置方面加方面少於圓徑九寸得為圓徑乃以方面自之得以十四乘之得為十四段方羃又以圓徑自乘之得下式又十一乘之得為

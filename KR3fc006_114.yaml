body:
  text: 二十五而一爲實又倍多加少以乘少數又十一乘之二十五而一多自乘加之爲方法又倍少數十一乘之二十五而一又倍多加之爲廉法從開立方除之卽高深各加差卽方徑一十四乘斛法以乘粟爲積尺前一十四除今還元一十四乘爲徑自乘者是一十一方自乘者是一十四故并之爲二十五凡此方圓二徑長短不同二徑各自乘爲方大小各別然則此壍方二丈九尺八寸壍徑三丈七寸皆成立方此應壍方自乘一十四乘之壍徑自乘一十一乘之二十五而一爲隅羃卽方法也但二隅方皆以壍數爲方面今此術就省倍小隅方加差爲短以差乘之爲短羃一十一乘之二十五而一又小隅方自乘之數卽是方圓之隅同有此數若二十五乘之還須二十五除直以小隅方自乘加之故不復乘除又須倍二廉之差一十一乘之二十五而一倍二廉加之故爲廉法不復二十五乘除之也草曰立天元一爲高又爲深加方面多於高二百九十八寸得爲方面又置方面加方面少於圓徑九寸得爲圓徑乃以方面自之得以十四乘之得爲十四段方羃又以圓徑自乘之得下式又十一乘之得爲

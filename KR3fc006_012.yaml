body:
  text: 度之四百八十通分內子得七千四百八十分以日月相去之數四千一百五十分減之餘三千三百三十分以分母七百收之得斗四度七百分度之五百三十卽月夜半所在度分也合問假令太史造仰觀臺上廣袤少下廣袤多上下廣差二丈上下袤差四丈上廣袤差三丈高多上廣一十一丈甲縣差一千四百一十八人乙縣差三千二百二十二人夏程人功常積七十五尺限五日役臺畢羨道從臺南面起上廣多下廣一丈二尺少袤一百四尺高多袤四丈甲縣一十三鄉乙縣四十三鄉每鄉別均賦常積六千三百尺限一日役羨道畢二縣差到人共造仰觀臺二縣鄉人共造羨道皆從先給甲縣以次與乙縣臺自下基給高道自初登給袤問臺道廣高袤及縣別給高廣袤各幾何荅曰臺高一十八丈

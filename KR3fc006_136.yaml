body:
  text: 二十分之一即百分之五自之得為同數興左相消得開立方得九十二五分之二出即十分之四即股也合問假令有股弦相乘羃四千七百三十九五分之三句少於弦五十四五分之二問股多少敦仁案舊本爛脫字今以術算補用陰文為別答曰六十八術曰羃自乘倍少數而一為立羃又少數再自乘半之以減立羃餘為實又少數自乘倍之為方法又置少數五之二而一為廉法從開立方除之即句加差即弦弦除羃即股草曰立天元一為句以句少於弦五十四五分之二即十分之四加之得為弦自之得為弦羃又以句自之得為句羃以減弦羃得為股羃以乘弦羃得寄左然後以股弦相乘羃四千七百三十九五分之三即十分之六

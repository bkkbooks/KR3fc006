body:
  text: 草曰立天元一為窖深加上袤多於深六十尺得為上袤又以上袤多於上廣一十尺減上袤得為上廣又以上袤少於下袤三十尺加上袤得為下袤又以上袤少於下廣一十尺加上袤得下為下廣乃倍上廣得加下廣得下式以上袤乘之得下式於上又倍下廣得以上廣加之得下式以下袤乘之得加入上位得下式以深乘之得下以六約之得下為窖積寄左然後以甲郡三萬八千七百四十五石六斗乙郡三萬四千九百五石六斗丙郡二萬六千二百七十石四斗丁郡一萬四千七十八石四斗併之得一十一萬四千石以斛法二尺五寸乘之得為同數與左相消得開立方得三十尺即窖深也合問
  hash: sha256:d4854f5faba00f45d77f6fb3b3170b50b89fdb17e608564c1dd5b3768a19afe3

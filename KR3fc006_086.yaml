body:
  text: 草曰立天元一爲窖深加上袤多於深六十尺得爲上袤又以上袤多於上廣一十尺減上袤得爲上廣又以上袤少於下袤三十尺加上袤得爲下袤又以上袤少於下廣一十尺加上袤得下爲下廣乃倍上廣得加下廣得下式以上袤乘之得下式於上又倍下廣得以上廣加之得下式以下袤乘之得加入上位得下式以深乘之得下以六約之得下爲窖積寄左然後以甲郡三萬八千七百四十五石六斗乙郡三萬四千九百五石六斗丙郡二萬六千二百七十石四斗丁郡一萬四千七十八石四斗併之得一十一萬四千石以斛法二尺五寸乘之得爲同數與左相消得開立方得三十尺卽窖深也合問
  hash: sha256:1c27649c77e25c205bd7daa22dff865d8dc6f66e8014e3a44f250048e10bb471

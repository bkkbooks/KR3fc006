body:
  text: 加入上廣得下式以高乘之得下式又以袤乘之得為六隄積寄左然後以甲縣二千三百七十五人乙縣二千三百七十八人丙縣五千二百四十七人併之得一萬人以程功常積一尺九寸八分乘之得為隄積又六因之得為同數與左相消得上下各三約之得開立方得一十八尺即下廣也合問求逐縣均給積尺受廣袤術曰以程功乘當縣人為積尺各六因積尺又乘袤羃廣差乘高為法除之為實又三因末廣以袤乘之廣差而一為都廉從開立方除之即甲袤以本高乘之以本袤除之即甲高又以廣差乘甲袤以本袤除之所得加末廣即甲上廣其甲上廣即乙末廣其甲高即垣高求都廉如前又并甲上下廣三之乘甲高以乘袤羃以法除之得垣方從開立
  hash: sha256:dfbbc1b41930b0d7b608fef3a790fa6f982255e11ceeb390afec7cfcd2ceb7c5

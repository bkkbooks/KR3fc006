body:
  text: 加入上廣得下式以高乘之得下式又以袤乘之得爲六隄積寄左然後以甲縣二千三百七十五人乙縣二千三百七十八人丙縣五千二百四十七人併之得一萬人以程功常積一尺九寸八分乘之得爲隄積又六因之得爲同數與左相消得上下各三約之得開立方得一十八尺卽下廣也合問求逐縣均給積尺受廣袤術曰以程功乘當縣人爲積尺各六因積尺又乘袤羃廣差乘高爲法除之爲實又三因末廣以袤乘之廣差而一爲都廉從開立方除之卽甲袤以本高乘之以本袤除之卽甲高又以廣差乘甲袤以本袤除之所得加末廣卽甲上廣其甲上廣卽乙末廣其甲高卽垣高求都廉如前又并甲上下廣三之乘甲高以乘袤羃以法除之得垣方從開立
  hash: sha256:29f9f9fe713a0b7a659dd8fed774460eb82e7715eba3e42e835488d9cec0904f

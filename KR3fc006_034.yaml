body:
  text: 并每人一日自穿運築程功及隄上下高廣各幾何答曰一人一日自穿運築程功四尺九寸二分敦仁案二分當作六分西頭高三丈四尺一寸上廣八尺下廣七丈六尺二寸東頭高三尺一寸上廣八尺下廣一丈四尺二寸正袤四十八丈斜袤四十八丈一尺甲縣正袤一十九丈二尺斜袤一十九丈二尺四寸下廣三丈九尺高一丈五尺五寸乙縣正袤一十四丈四尺

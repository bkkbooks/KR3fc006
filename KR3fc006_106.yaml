body:
  text: 本高羃除之為乙積今不乘除便以為乙積即如以六因乙積又以本高羃寄左乘之以袤差乘本廣除之也然後以程功三十六尺乘乙縣二百四十三人得又以限日八乘之得為乙積又以六因之得又以高羃一萬四千四百尺乘之以袤差乘廣得三千六百尺除之得為同數與左相消得半之得下開立方得七十二尺為乙高以減甍高餘四十八尺即甲高也合問假令圓囤上小下大斛法二尺五寸以率徑一周三上下周差一丈二尺高多上周一丈八尺容粟七百五斛六斗今已運出二百六十六石四斗問殘粟去口上下周高各多少答曰上周一丈八尺下周三丈高三丈六尺去口一丈八尺

body:
  text: 得小頭爲甲袤求深廣以本袤及深廣差求之爲法以兩頭上廣差乘甲袤以本袤除之所得加小頭上廣卽甲上廣以小頭深減南頭深餘以乘甲袤以本袤除之所得加小頭深卽甲深又正袤自乘深差自乘并而開方除之卽斜袤若求乙丙丁每以前大深廣爲後小深廣準甲求之卽得求甲草曰立天元一爲甲袤合以深差乘之本袤除之爲甲深差今不乘除便以甲袤爲甲深差率卽如以本袤乘甲深差以深差除之也又置本袤一里二百七十六步以里法三百步步法六尺通之得三千四百五十六尺以乘北頭深一十八尺六寸又以北頭深減南頭深二百四十一尺八寸餘二百二十三尺二寸爲深差除之得爲甲北頭深率以甲深差率加之得下式爲甲南頭深率又天元甲袤合以廣差乘之本袤除之爲甲廣差今不乘除便以甲袤爲甲

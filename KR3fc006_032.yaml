body:
  text: 本高得二千一百六十尺除之得為同數與左相消得開立方得七十尺即甲袤也餘各依術入之合問假令築隄西頭上下廣差六丈八尺二寸東頭上下廣差六尺二寸東頭高少於西頭高三丈一尺上廣多東頭高四尺九寸正袤多於東頭高四百七十六尺九寸甲縣六千七百二十四人乙縣一萬六千六百七十七人丙縣一萬九千四百四十八人丁縣一萬二千七百八十一人四縣每人一日穿土九石九斗二升每人一日築常積一十一尺四寸十三分寸之六穿方一尺得土八斗古人負土二斗四升八合平道行一百九十二步一日六十二到今隔山渡水取土其平道只有一十一步山斜高三十步水寬一十二步上山三當四下山六當五水行一當二平道踟𨆼十加一載輸一十四步減計一人作功為均積四縣共造一日役畢今從東頭與甲其次與乙丙丁問給斜正袤與高及下廣

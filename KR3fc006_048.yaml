body:
  text: 以甲高差率加之得為甲西頭高率又天元甲袤合以下廣差乘之本袤除之為甲下廣差今不乘除又以分母三十一乘之得為甲下廣差率即如以本袤乘甲下廣差以下廣差除之又以三十一乘之也又以本袤四百八十尺乘東下廣一十四尺二寸以下廣差六十二尺除之得一百九尺六十二分尺之五十八約為三十一分尺之二十九以分母三十一乘之得三千四百八尺為東下廣率以甲下廣差率加之得為甲西下廣率又以本袤四百八十尺乘上廣八尺以下廣差六十二尺除之得六十一尺六十二分尺之五十八約為三十一分尺之二十九以分母三十一乘之得一千九百二十尺為上廣率乃倍甲西頭高率得下加東頭高率得於上以上廣率加甲西下廣率而半之得以乘上得於頭又倍東頭高率得加甲西
  hash: sha256:46364ca42eb6a20b9a60110bad555bdc1d835169dc5437c9c1fd4d66c3ee8ee5

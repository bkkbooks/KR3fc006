body:
  text: 以甲高差率加之得爲甲西頭高率又天元甲袤合以下廣差乘之本袤除之爲甲下廣差今不乘除又以分母三十一乘之得爲甲下廣差率卽如以本袤乘甲下廣差以下廣差除之又以三十一乘之也又以本袤四百八十尺乘東下廣一十四尺二寸以下廣差六十二尺除之得一百九尺六十二分尺之五十八約爲三十一分尺之二十九以分母三十一乘之得三千四百八尺爲東下廣率以甲下廣差率加之得爲甲西下廣率又以本袤四百八十尺乘上廣八尺以下廣差六十二尺除之得六十一尺六十二分尺之五十八約爲三十一分尺之二十九以分母三十一乘之得一千九百二十尺爲上廣率乃倍甲西頭高率得下加東頭高率得於上以上廣率加甲西下廣率而半之得以乘上得於頭又倍東頭高率得加甲西
  hash: sha256:594370dda46e52485718526c336a57cb662d9140688b6c2dd7b0f6fe4a73162e

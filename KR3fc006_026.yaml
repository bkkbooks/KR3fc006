body:
  text: 本高羃三萬二千四百尺乘之廣差乘袤差得八百尺除之得爲同數與左相消得上下俱半之得開立方得一百三十五尺卽乙高也餘各依術入之合問求羨道廣袤高術曰以均賦常積乘二縣五十六鄉又六因爲積又以道上廣多下廣數加上廣少袤爲下廣少袤又以高多袤加下廣少袤爲下廣少高以乘下廣少袤爲隅陽羃又以下廣少上廣乘之爲鼈隅以減積餘三而一爲實并下廣少袤與下廣少高以下廣少上廣乘之爲鼈從橫廉羃三而一加隅羃爲方法又以三除上廣多下廣以下廣少袤下廣少高加之爲廉法從開立方除之卽下廣加廣差卽上廣加袤多上廣於上廣卽袤加廣多袤卽道高草曰立天元一爲下廣加上廣多下廣一

body:
  text: 本高羃三萬二千四百尺乘之廣差乘袤差得八百尺除之得為同數與左相消得上下俱半之得開立方得一百三十五尺即乙高也餘各依術入之合問求羡道廣袤高術曰以均賦常積乘二縣五十六鄉又六因為積又以道上廣多下廣數加上廣少袤為下廣少袤又以高多袤加下廣少袤為下廣少高以乘下廣少袤為隅陽羃又以下廣少上廣乘之為鱉隅以減積餘三而一為實并下廣少袤與下廣少高以下廣少上廣乘之為鱉從橫廉羃三而一加隅羃為方法又以三除上廣多下廣以下廣少袤下廣少高加之為廉法從開立方除之即下廣加廣差即上廣加袤多上廣於上廣即袤加廣多袤即道高草曰立天元一為下廣加上廣多下廣一

body:
  text: 縣二千三百七十五人得為甲隄積又六因之得又以本袤羃四千三百五十六尺乘之以廣差乘本高得一百八十尺除之得為同數與左相消得開立方得三十三尺即甲袤也合問求乙丙草曰立天元一為甲乙并袤依前入之得寄左然後以甲縣二千三百七十五人乙縣二千三百七十八人併之得四千七百五十三人以常積尺數乘之得為甲乙并隄積又六因之得又以本袤羃乘之廣差乘本高除之得下為同數與左相消得開立方得四十六尺二寸為甲乙并袤以甲袤三十三尺減之餘一十三尺二寸即乙袤也以甲乙并袤減本袤六十六尺餘一十九尺八寸即丙袤也合問假令穿河袤一里二百七十六步下廣六步一尺二寸北頭深一丈八尺六寸上廣十二步二
  hash: sha256:8d341795336de41fb02df4583f4eb0d88317b32d9c5fbccd1fb2bc9c3ed2ecf5

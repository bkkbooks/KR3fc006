body:
  text: 以本袤羃二十三萬四百尺乘之以高差乘下廣差一千九百二十二尺除之得一億五千二百八十六萬三千一百一十六尺一千九百二十二分尺之七百四十四約為三十一分尺之一十二通之得為同數與左相消得開立方得四百三十二尺為甲乙丙并袤以甲乙并袤減之餘九十六尺即丙袤也以甲乙丙并袤減本袤餘四十八尺即丁袤也合問求隄都積術曰置西頭高倍之加東頭高又并西頭上下廣半而乘之又置東頭高倍之加西頭高又并東頭上下廣半而乘之并二位積以正袤乘之六而一得隄積也草曰置西頭高三十四尺一寸倍之得六十八尺二寸加東頭高三尺一寸共得七十一尺三寸併西頭上廣八尺下廣七十六尺二寸得八十四尺二寸半之得四十

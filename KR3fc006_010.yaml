body:
  text: 度分以減朔日夜半日所在度分若度分不足減加往宿度其分不足減者退一度為行分而減之餘即朔日夜半月行所在度及分也凡入歷當月行定分即是月一日之行分但此定分滿章歲而一為度凡日一日行一度然則章歲者即是日之一日行分也今按九章均輸篇有犬追兔術與此術相似彼問犬走一百步兔走七十步令兔先走七十五步犬始追之問幾何步追及答曰二百五十步追及彼術曰以兔走減犬走餘者為法又以犬走乘兔先走為實實如法而一即得追及步數此術亦然何者假令月行定分九千章歲七百即是日行七百分月行九千分令日月行數相減餘八千三百分者是日先行之數然月始追之必用一日而相及也令定小餘者亦是日月相及之日分假令定小餘一萬即相及定分此乃無對為數其日法者亦是相及之分此又同數為有八千三百是先行分也斯則異矣但用日法除之即四千一百五十即先行分故以夜半之時日在月前月在日後以日月相去之數四千一百五十減日行所在度分即月夜半所在度分也草曰以章歲七百減朔月行定分九千餘八千三百分以乘朔日定小餘一萬得八千三百萬以日法二萬除之得四千一百五十為先行分乃置日在斗十度七百分

body:
  text: 自之得為同數與左相消得開立方得一十五十分之三即句也餘依術算合問假令有股弦相乘羃七百二十六句七十分之七問股多少答曰股二十六五分之二敦仁案知不足齋本有此股二十三字微波榭本無術曰羃自乘為實句自乘為方法從開方除之所得又開方即股數亦是股為長以股得股羃又開股北分母常草曰立天元一為股羃又以句七十分之七自之得為句羃以加股羃得為弦羃以股羃乘之得寄左然後以股弦相乘羃七百二十六自之得為同數與左相消得開平方得下為股羃又開方得二十六五分之二即十分之四即股也合問

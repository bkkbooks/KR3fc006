body:
  text: 羃以截多乘之減積餘為實以多乘差加羃為方法多加差為廉法從開立方除之即上方加差即合所問凡方亭上下方相乘又命自乘并以乘高為虛命三而一為方亭積若圓亭上下徑相乘又各自乘并以乘高為虛又十一乘之四十二而一為圓亭積今方圓二積并在一處故以四十二復乘之即得圓虛十一方虛十四凡二十五而一得一虛之積又三除虛積為方亭實乃依方高覆問法見上下方差及高差與積求上下方高術入之故三乘二十五而一草曰立天元一為上方加深多於上方一十四尺得為深又置深數加深少於下方七尺得下為下方乃以上方自乘得下方自乘得上下方相乘得下式併三位得下又以深乘之得下式三而一得為方窖積寄左然後以斛法二尺五寸乘粟五千一百四十五石得又以方羃率十四乘之以方羃率十四圓羃率十一併之得二十五除之得為如積與左相消得開立方得七尺即

body:
  text: 羃以截多乘之減積餘爲實以多乘差加羃爲方法多加差爲廉法從開立方除之卽上方加差卽合所問凡方亭上下方相乘又命自乘并以乘高爲虛命三而一爲方亭積若圓亭上下徑相乘又各自乘并以乘高爲虛又十一乘之四十二而一爲圓亭積今方圓二積并在一處故以四十二復乘之卽得圓虛十一方虛十四凡二十五而一得一虛之積又三除虛積爲方亭實乃依方高覆問法見上下方差及高差與積求上下方高術入之故三乘二十五而一草曰立天元一爲上方加深多於上方一十四尺得爲深又置深數加深少於下方七尺得下爲下方乃以上方自乘得下方自乘得上下方相乘得下式併三位得下又以深乘之得下式三而一得爲方窖積寄左然後以斛法二尺五寸乘粟五千一百四十五石得又以方羃率十四乘之以方羃率十四圓羃率十一併之得二十五除之得爲如積與左相消得開立方得七尺卽

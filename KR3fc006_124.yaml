body:
  text: 得下式又以高乘之得下位以十一乘之得又以深乘之得併二位得下式寄左然後以斛法二尺五寸乘粟三千七十二石得以十四乘之得為同數與左相消得下以二十五約之得下開立方得一十四尺即深也合問假令有粟五千一百四十五石欲作方窖圓窖各一令口小底大方面與圓徑等兩深亦同其深少於下方七尺多於上方一丈四尺盛各滿中而粟適盡圓率斛法並與前同問方徑深各多少答曰上方徑各七尺下方徑各二丈八尺深各二丈一尺術曰以四十二乘斛法以乘粟七十五而一為方亭積令方差自乘三而一為隅陽
  hash: sha256:3ae9977bea4007c899c4eac0bf006d31de2a2aaa915ae6c990fe1c7f0d5f5eb4

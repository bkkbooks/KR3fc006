body:
  text: 求均給積尺受廣袤深術曰如築隄術入之以斛法乘甲郡輸粟為積尺又三因以深羃乘之以廣差乘袤差而一為實深乘上廣廣差而一為上廣之高深乘上袤袤差而一為上袤之高上廣之高乘上袤之高三之為方法又并兩高三之二而一為廉法從開立方除之即甲深以袤差乘之以本深除之所得加上袤即甲下袤以廣差乘之本深除之所得加上廣即甲下廣若求乙丙丁每以前下廣袤為後上廣袤以次皆準此求之即得若求人數各以程功約當郡積尺求甲草曰立天元一為甲深合以廣差乘之窖深除之為甲廣差今不乘除便以甲深為甲廣差率即如以窖深乘甲廣差以廣差除之也又以窖深三十尺乘上廣八十尺以廣差二十尺除之得為甲上廣率以甲廣差率加之得為甲下廣率又天元甲深合以

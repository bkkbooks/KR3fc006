body:
  text: 求均給積尺受廣袤深術曰如築隄術入之以斛法乘甲郡輸粟爲積尺又三因以深羃乘之以廣差乘袤差而一爲實深乘上廣廣差而一爲上廣之高深乘上袤袤差而一爲上袤之高上廣之高乘上袤之高三之爲方法又并兩高三之二而一爲廉法從開立方除之卽甲深以袤差乘之以本深除之所得加上袤卽甲下袤以廣差乘之本深除之所得加上廣卽甲下廣若求乙丙丁每以前下廣袤爲後上廣袤以次皆準此求之卽得若求人數各以程功約當郡積尺求甲草曰立天元一爲甲深合以廣差乘之窖深除之爲甲廣差今不乘除便以甲深爲甲廣差率卽如以窖深乘甲廣差以廣差除之也又以窖深三十尺乘上廣八十尺以廣差二十尺除之得爲甲上廣率以甲廣差率加之得爲甲下廣率又天元甲深合以

body:
  text: 高三因上袤之高半之為廉法從開立方除之得乙高以減甍高餘即甲高求廣袤依率求之此乙積本倍下袤上袤從之以下廣及高乘之六而一為一甍積今還元須六因之以高羃乘之為實乘袤差乘廣而一得取高自乘以乘二上袤之高并大廣袤相連之數則三小高為廉法各以取高為方仍有取高為立方者故半之為立方一又須半廉法草曰立天元一為乙高合以袤差乘之本高除之為乙袤差今不乘除便以乙高為乙袤差率即如以本高乘乙袤差以袤差除之也又以本高一百二十尺乘上袤三十尺以上袤三十尺下袤九十尺相減餘六十尺為袤差除之得為上袤率加乙袤差率得為乙下袤率又天元乙高合以本廣乘之本高除之為乙廣今不乘除便以乙高為乙廣率即如以本高乘乙廣以本廣除之也乃倍乙下袤率得加上袤率得以乙廣率乘之得下式又以乙高乘之得此數合以六除之又以袤差乘廣乘之以
  hash: sha256:909297f1402a4dc72076a08871215abba7a2eb1785880869bb3cdad62d5bb6b0

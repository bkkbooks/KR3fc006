body:
  text: 上下廣得下式半之得下式乘之得加入上位得以正袤乘之得下式合以六除之為隄積今不除便為隄積內寄六寄左為母然後以甲縣六千七百二十四人乙縣一萬六千六百七十七人丙縣一萬九千四百四十八人丁縣一萬二千七百八十一人併之得五萬五千六百三十人以程功四尺九寸六分乘之得為隄積又以分母六乘之得為同數與左相消得開立方得三尺一寸即東頭高也餘各依術入之合問求甲縣高廣正斜袤術曰以程功乘甲縣人以六因取積又乘袤羃以下廣差乘高差以法除之為實又并小頭上下廣以乘小高三因之為垣頭羃又乘袤羃如法而一為垣方又三因小頭下廣以乘正袤以廣差除之為都廉從開立方除之得小頭
  hash: sha256:7d5c6da3a280fc8a9ecb56c9cece882e939f62eb73f182cefd52c5395d06bcd5

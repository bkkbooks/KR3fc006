body:
  text: 八尺卽上周也合問求粟去口術曰以斛法乘出斛三十六乘之以乘高羃如周差羃而一爲實高乘上周周差而一爲小高令自乘三之爲方法三因小高爲廉法從開立方除之卽去口三十六乘訖卽是截方亭之前方窖不別置去口以周差乘之以本高除之所加上周卽粟周敦仁案所下脫得字草曰立天元一爲粟去口合以周差乘之以本高除之爲出粟周差今不乘除便以爲出粟周差率卽如以本高乘出粟周差以周差除之也又以本高三十六尺乘上周一十八尺以周差一十二尺除之得爲上周率加出粟周差率得爲出粟下周率乃以上周率自乘得下式下周率自乘得上下周相乘得併三位得又以粟去口乘之得下此數合以三十六除之又以周差羃乘之高羃而一爲出粟積今不乘除便爲出粟積卽如以三十六因出

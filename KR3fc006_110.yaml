body:
  text: 八尺即上周也合問求粟去口術曰以斛法乘出斛三十六乘之以乘高羃如周差羃而一為實高乘上周周差而一為小高令自乘三之為方法三因小高為廉法從開立方除之即去口三十六乘訖即是截方亭之前方窖不別置去口以周差乘之以本高除之所加上周即粟周敦仁案所下脫得字草曰立天元一為粟去口合以周差乘之以本高除之為出粟周差今不乘除便以為出粟周差率即如以本高乘出粟周差以周差除之也又以本高三十六尺乘上周一十八尺以周差一十二尺除之得為上周率加出粟周差率得為出粟下周率乃以上周率自乘得下式下周率自乘得上下周相乘得併三位得又以粟去口乘之得下此數合以三十六除之又以周差羃乘之高羃而一為出粟積今不乘除便為出粟積即如以三十六因出

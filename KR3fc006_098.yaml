body:
  text: 得下爲高乃以上方自乘得下方自乘得上下方相乘得下式併三位得下又以高乘之得下式以三除之得爲亭倉積寄左然後置容粟一百八十七石二斗以斛法二尺五寸乘之得爲如積與左相消得開立方得三尺卽上方也加差得下方高合問求餘粟高及上方術曰以斛法乘出粟三之以乘高羃令方差羃而一爲實此是大小高各自乘又相乘各乘取高是大高者卽是取高與小高并高乘上方方差而一爲小高令自乘三之爲方法三因小高爲廉法從開立方除之得取出高以減本高餘卽殘粟高置出粟高又以方差乘之以本高除之所得加上方卽餘粟上方此本術曰上下方相乘又各自乘并以高乘之三而一今還元三之又高羃乘之差羃而一得大小高相乘又各目乘之數何者若高乘下方方差而一得大高也若高乘上方方差而一得小高也然則斯本下方自乘故須高乘之差自乘而一卽
  hash: sha256:ac79f47cec31349cb44458cc02bc6fe8f41bc6e3394daf1ff4a21848fd542237

body:
  text: 相消得上下俱以一十二十分之四約之得下式開立方得一百八十分之五即股也合問假令有句弦相乘羃一千三百三十七二十分之一弦多於股一十分之一問股多少答曰九十二五分之二術曰羃自乘倍多而一為立羃又多再自乘半之減立羃餘為實又多數自乘倍之為方法又置多數五之二而一為廉法從開立方除之即股句弦相乘羃自乘即句羃乘弦羃之積故以倍股弦差而一得一股與半差為方今多再自乘半之為隅橫虛二立廉倍之為從隅多為上廉即二多法故五之二而一草曰立天元一為股以弦多於股一十分之一加之得為弦自之得為弦羃又以股自之得為股羃以減弦羃得為句羃乘弦羃得寄左又以句弦相乘羃一千三百三十七
  hash: sha256:a5f159d67794332a21dc79eca0191c06b813e233ac470d5e277ab27dd149b6ef

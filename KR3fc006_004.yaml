body:
  text: 太史丞比年已來奉敕校勘傳仁均歷凡駁正術錯三十餘道即付太史施行伏尋九章商功篇有平地役功受袤之術至於上寬下狹前高後卑正經之內闕而不論致使今代之人不達深理就平正之閒同欹邪之用斯乃圓孔方枘如何可安臣晝思夜想臨書浩歎恐一旦瞑目將來莫覩遂於平地之餘續狹斜之法凡二十術名曰緝古請訪能算之人考論得失如有排其一字臣欲謝以千金輕用陳聞伏深戰悚謹言
  hash: sha256:fc1eccec209effc3c77ee252dadba823c6b9f6cdd3e84c3ac489829df82c58ff

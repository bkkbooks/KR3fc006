body:
  text: 假令有股十六二分之一句弦相乘羃一百六十四二十五分之十四問句多少荅曰句八五分之四術曰羃自乘爲實股自乘爲方法從開方除之所得又開方卽句草曰立天元一爲句羃又以股十六二分之一卽十分之五自之得爲股羃以加句羃得爲弦羃以句羃乘之得寄左然後以句弦相乘羃一百六十四二十五分之十四卽百分之五十六自之得爲同數與左相消得開平方得下爲句羃又開方得八五分之四卽十分之八卽句也合問

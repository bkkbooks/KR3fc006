body:
  text: 假令有股十六二分之一句弦相乘羃一百六十四二十五分之十四問句多少答曰句八五分之四術曰羃自乘為實股自乘為方法從開方除之所得又開方即句草曰立天元一為句羃又以股十六二分之一即十分之五自之得為股羃以加句羃得為弦羃以句羃乘之得寄左然後以句弦相乘羃一百六十四二十五分之十四即百分之五十六自之得為同數與左相消得開平方得下為句羃又開方得八五分之四即十分之八即句也合問

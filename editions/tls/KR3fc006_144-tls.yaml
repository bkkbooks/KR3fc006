body:
  text: 右緝古算經細草陽城張古餘先生𢰅壬戌季秋先生奉省檄權知吾郡自公之暇以是書命銳覆校旣卒業而爲之跋其尾案立天元術始見元李冶測圓海鏡益古演段二書冶稱其術出於洞淵九容今洞淵之書已亡莫能詳所自矣緝古二十術其十九術皆以從立方除問數奇勝術意隱祕學者未易通曉惟以立天元術解之其中條理乃渙若冰釋葢金元如積之法濫觴於斯已今世爲九九學者不乏其人而通古𧧼達深理者卒鮮先生此書洵足以發揮古人箴砭俗學非若劉孝孫之於張邱建聊依術而衍其數也是歲十二月戊戌朔二十日丁巳元和李銳記

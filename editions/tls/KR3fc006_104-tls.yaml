body:
  text: 高三因上袤之高半之爲廉法從開立方除之得乙高以減甍高餘卽甲高求廣袤依率求之此乙積本倍下袤上袤從之以下廣及高乘之六而一爲一甍積今還元須六因之以高羃乘之爲實乘袤差乘廣而一得取高自乘以乘二上袤之高并大廣袤相連之數則三小高爲廉法各以取高爲方仍有取高爲立方者故半之爲立方一又須半廉法草曰立天元一爲乙高合以袤差乘之本高除之爲乙袤差今不乘除便以乙高爲乙袤差率卽如以本高乘乙袤差以袤差除之也又以本高一百二十尺乘上袤三十尺以上袤三十尺下袤九十尺相減餘六十尺爲袤差除之得爲上袤率加乙袤差率得爲乙下袤率又天元乙高合以本廣乘之本高除之爲乙廣今不乘除便以乙高爲乙廣率卽如以本高乘乙廣以本廣除之也乃倍乙下袤率得加上袤率得以乙廣率乘之得下式又以乙高乘之得此數合以六除之又以袤差乘廣乘之以
  hash: sha256:270e603a1877175082d0ce60b932d7091f732cc1fae50a3c6db0857b6f3d1571

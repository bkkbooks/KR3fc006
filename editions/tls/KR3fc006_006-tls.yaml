body:
  text: 古算書多有細草緝古算經闕焉辛酉仲夏余有事於崇明海門閒蚤晏𠋫潮汐暇時無以自遣適篋中攜是編因爲步算補草計往返旬有四日而畢錄而存之或亦言古學者所不廢也嘉慶六年六月初四日陽城張敦仁識於崇明之步鎮海壖

body:
  text: 法又并兩高三之二而一爲廉法從開立方除之卽乙高以減本高餘卽甲高此是從下給臺甲高又以廣差乘乙高如本高而一所得加上廣卽甲上廣又以袤差乘乙高如本高而一所得加上袤卽甲上袤其甲上廣袤卽乙下廣袤臺上廣袤卽乙上廣袤其後求廣袤有增損者皆放此此應三因乙積臺高再乘上下廣差乘袤差而一又以臺高乘上廣爲上廣之高又以臺高乘上袤爲上袤之高爲小羃二因下袤之高爲中羃一凡下袤下廣之高卽是截高與上袤上廣之高相連并數然則有中羃定有小羃一又有上廣之高乘截高爲羃各一又下廣之高乘下袤之高爲大羃二乘上袤之高爲中羃一其大羃之中又小羃一復有上廣上袤之高爲中羃各乘截高爲中羃各一又截高自乘爲羃一其中羃之內有小羃一又上袤之高乘截高爲羃一然則截高自相乘爲羃二小羃六又上廣上袤之高各三以乘截高爲羃六令皆半之故以三乘小羃又上廣上袤之高各三今但半之各得一又二分之一故三之二而一諸羃截爲積尺草曰立天元一爲乙高合以廣差乘之本高而一爲乙廣差今不乘除便以乙高爲乙廣差率卽如以本高乘乙廣差以廣差除之也又天元乙

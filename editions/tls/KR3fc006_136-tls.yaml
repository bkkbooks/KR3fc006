body:
  text: 二十分之一卽百分之五自之得爲同數興左相消得開立方得九十二五分之二出卽十分之四卽股也合問假令有股弦相乘羃四千七百三十九五分之三句少於弦五十四五分之二問股多少敦仁案舊本爛脫字今以術算補用陰文爲別荅曰六十八術曰羃自乘倍少數而一爲立羃又少數再自乘半之以減立羃餘爲實又少數自乘倍之爲方法又置少數五之二而一爲廉法從開立方除之卽句加差卽弦弦除羃卽股草曰立天元一爲句以句少於弦五十四五分之二卽十分之四加之得爲弦自之得爲弦羃又以句自之得爲句羃以減弦羃得爲股羃以乘弦羃得寄左然後以股弦相乘羃四千七百三十九五分之三卽十分之六

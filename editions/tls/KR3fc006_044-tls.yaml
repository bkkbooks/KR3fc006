body:
  text: 上下廣得下式半之得下式乘之得加入上位得以正袤乘之得下式合以六除之爲隄積今不除便爲隄積內寄六寄左爲母然後以甲縣六千七百二十四人乙縣一萬六千六百七十七人丙縣一萬九千四百四十八人丁縣一萬二千七百八十一人併之得五萬五千六百三十人以程功四尺九寸六分乘之得爲隄積又以分母六乘之得爲同數與左相消得開立方得三尺一寸卽東頭高也餘各依術入之合問求甲縣高廣正斜袤術曰以程功乘甲縣人以六因取積又乘袤羃以下廣差乘高差以法除之爲實又并小頭上下廣以乘小高三因之爲垣頭羃又乘袤羃如法而一爲垣方又三因小頭下廣以乘正袤以廣差除之爲都廉從開立方除之得小頭
  hash: sha256:517de974c7d872ac325ec46acfae5c2b0bbb256b5c6139e2e27c454cec4b94bc

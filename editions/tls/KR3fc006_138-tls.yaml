body:
  text: 自之得爲同數與左相消得開立方得一十五十分之三卽句也餘依術算合問假令有股弦相乘羃七百二十六句七十分之七問股多少荅曰股二十六五分之二敦仁案知不足齋本有此股二十三字微波榭本無術曰羃自乘爲實句自乘爲方法從開方除之所得又開方卽股數亦是股爲長以股得股羃又開股北分母常草曰立天元一爲股羃又以句七十分之七自之得爲句羃以加股羃得爲弦羃以股羃乘之得寄左然後以股弦相乘羃七百二十六自之得爲同數與左相消得開平方得下爲股羃又開方得二十六五分之二卽十分之四卽股也合問
  hash: sha256:8f440803689b4f70b8d8c55bab94bd4b6099c138c0d061396f36b4a4437cde6a

body:
  text: 尺四寸南頭深二百四十一尺八寸上廣八十六步四尺八寸運土於河西岸造漘北頭高二百二十三尺二寸南頭無高下廣四百六尺七寸五釐袤與河同甲郡二萬二千三百二十人乙郡六萬八千七十六人丙郡五萬九千九百八十五人丁郡三萬七千九百四十四人自穿負築各人程功常積三尺七寸二分限九十六日役河漘倶了四郡分𠔏造漘其河自北頭先給甲郡以次與乙合均賦積尺問逐縣各給斜正袤上廣及深并漘上廣各多少荅曰漘上廣五丈八尺二寸一分甲郡正袤一百四十四丈斜袤一百四十四丈三尺上廣二十六丈四寸深一十一丈一尺六寸乙郡正袤一百一十五丈二尺斜袤一百一十五丈四尺四寸

body:
  text: 之得寄左然後以甲縣六千七百二十四人乙縣一萬六千六百七十七人併之得二萬三千四百一人以程功四尺九寸六分乘之得又六因之得又以本袤羃二十三萬四百尺乘之以高差乘下廣差一千九百二十二尺除之得八千三百四十八萬二千六百九十尺一千九百二十二分尺之一百二十四約爲三十一分尺之二通之得爲同數與左相消得開立方得三百三十六尺爲甲乙并袤以甲袤減之餘一百四十四尺卽乙袤也合問求丙丁草曰立天元一爲甲乙丙并袤依前入之得寄左然後以甲縣六千七百二十四人乙縣一萬六千六百七十七人丙縣一萬九千四百四十八人併之得四萬二千八百四十九人以程功四尺九寸六分乘之得又六因之得又
  hash: sha256:4a4e5c05b7480ceb76a36ea2978e7ece3777c6ae2772e08768181557ff9bce36

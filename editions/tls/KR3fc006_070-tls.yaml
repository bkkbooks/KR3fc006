body:
  text: 上廣四十丈九尺二寸深一十八丈六尺丙郡正袤五十七丈六尺斜袤五十七丈七尺二寸上廣四十八丈三尺六寸深二十二丈三尺二寸丁郡正袤二十八丈八尺六寸敦仁案六寸二字衍此緣與斜袤數相涉而誤斜袤二十八丈八尺六寸上廣五十二丈八寸深二十四丈一尺八寸術曰如築隄術入之覆隄爲河彼注甚明高深稍殊程功是同意可知也以程功乘甲郡人又以限日乘之四之三而一爲積又六因以乘袤羃以上廣差乘深差爲法除之爲實又并小頭上下廣以乘小頭深三之爲垣頭羃又乘袤羃以法除之爲垣方三因小頭上廣以乘正袤以廣差除之爲都廉從開立方除之卽

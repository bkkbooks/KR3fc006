body:
  text: 廣差乘甲袤本袤而一以下廣加之卽甲上廣又以臺高乘甲袤本袤除之卽甲高草曰立天元一爲甲袤合以廣差乘之本袤除之爲甲廣差今不乘除便以甲袤爲甲廣差率卽如以本袤乘甲廣差以廣差除之也又以本袤一百四十尺乘下廣二十四尺以廣差一十二尺除之得爲下廣率以甲廣差率加之得爲甲上廣率又天元甲袤合以本高乘之本袤除之爲甲高今不乘除便以甲袤爲甲高率卽如以本袤乘甲高以本高除之也乃倍下廣率得加甲上廣率得以甲袤乘之得下式又以甲高率乘之得合以六除之又以廣差乘本高乘之以本袤羃除之爲甲積今不乘除便以爲甲積卽如六因甲積又以本袤羃乘之以廣差乘本高除之也寄左然後以常積六千三百尺乘甲縣一十三鄉得爲甲積又六因之得又以本袤羃一萬九千六百尺乘之以廣差乘

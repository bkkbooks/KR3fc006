body:
  text: 粟周二丈四尺求圓囤上下周及高術曰以斛法乘容粟又三十六乘之三而一爲方亭之積又以周差自乘三而一爲隅陽羃以乘截高以減亭積餘爲實又周差乘截高加隅陽羃爲方法又以周差加截高爲廉法從開立方除之得上周加差而合所問草曰立天元一爲上周加上下周差一十二尺得爲下周又置天元加高多上周一十八尺得爲高乃以上周自乘得下周自乘得上下周相乘得下式三位併之得又以高乘之得以三除之得下式爲方亭積合以十二除之爲囤積今不除便爲囤積內寄十寄左二爲母然後以斛法二尺五寸乘容粟七百五斛六斗得爲囤積又以分母十二因之得爲如積與左相消得開立方得一十

body:
  text: 甲縣鄉人給高九丈上廣三丈下廣二丈四尺上袤七丈下袤一十四丈乙縣鄉人給高九丈上廣三丈六尺下廣三丈下袤七丈敦仁案羨道共積三十五萬二千八百尺甲一十三鄉應受積八萬一千九百尺乙四十三鄉應受積二十七萬九百尺今以此兩縣高廣袤各依術求之甲得積二十五萬二千尺乙得積一十萬八百尺各如常積六千三百尺而一得甲縣四十鄉乙縣一十六鄉與問數不合元和李氏銳曰此甲乙二縣鄉人別給羨道據問數術文甲當在南乙當在北據荅數則甲道在下乙道在上兩者差異不可立法詳尋其義當以問數術文爲正其荅宜云甲縣鄉人給高九丈上廣三丈下廣二丈四尺袤七丈乙縣鄉人給南頭高九丈北頭高一十八丈

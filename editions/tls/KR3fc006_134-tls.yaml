body:
  text: 相消得上下倶以一十二十分之四約之得下式開立方得一百八十分之五卽股也合問假令有句弦相乘羃一千三百三十七二十分之一弦多於股一十分之一問股多少荅曰九十二五分之二術曰羃自乘倍多而一爲立羃又多再自乘半之減立羃餘爲實又多數自乘倍之爲方法又置多數五之二而一爲廉法從開立方除之卽股句弦相乘羃自乘卽句羃乘弦羃之積故以倍股弦差而一得一股與半差爲方今多再自乘半之爲隅橫虛二立廉倍之爲從隅多爲上廉卽二多法故五之二而一草曰立天元一爲股以弦多於股一十分之一加之得爲弦自之得爲弦羃又以股自之得爲股羃以減弦羃得爲句羃乘弦羃得寄左又以句弦相乘羃一千三百三十七
  hash: sha256:c5ce1e3627db328a7de46bd892304588512e54e184740946c4f0accf51c15352

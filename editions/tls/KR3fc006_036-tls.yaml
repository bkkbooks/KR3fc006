body:
  text: 斜袤一十四丈四尺三寸下廣五丈七尺六寸高二丈四尺八寸丙縣正袤九丈六尺斜袤九丈六尺二寸下廣七丈高三丈一尺丁縣正袤四丈八尺斜袤四丈八尺一寸下廣七丈六尺二寸高三丈四尺一寸求人到程功運築積尺術曰置上山四十步下山二十五步渡水二十四步平道一十一步踟𨆼之閒十加一載輸一十四步一返計一百二十四步以古人負土二斗四升八合平道行一百九十二步以乘一日六十二到爲實卻以一返步爲法除得自運土到數也又以一到負土數乘之卻

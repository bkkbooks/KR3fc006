body:
  text: 唐通直郎太史丞臣王孝通𢰅并注張敦仁𢰅細草假令亭倉上小下大上下方差六尺高多上方九尺容粟一百八十七石二斗今已運出五十石四斗問倉上下方高及餘粟深上方各多少荅曰上方三尺下方九尺高一丈二尺餘粟深上方倶六尺求倉方高術曰以斛法乘容粟爲積尺又方差自乘三而一爲隅陽羃以乘截高以減積餘爲實又方差乘截高加隅陽羃爲方法又置方差加截高爲廉法從開立方除之卽上方加差卽合所問草曰立天元一爲上方加方差六尺得下爲下方又置天元加高多上方九尺

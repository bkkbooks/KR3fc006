body:
  text: 以穿方一尺土數除之得一人一日運功積又以一人穿土九石九斗二升以穿方一尺土數除之爲法除之得穿用人數復置運功積以每人一日常積除之得築用人數并之得六人𠔏成二十九尺七寸六分以六人除之卽一人程功也草曰置山高三十步四之三而一得四十爲上山步又置山高步五之六而一得二十五爲下山步又置水寬一十二步倍之得二十四爲渡水步併三步得八十九步加平道一十一步得一百步踟𨆼之閒十加一得一百一十步又加載輸一十四步𠔏得一百二十四爲一返步又以古人負土平道行一百九十二步乘一日到數六十二得一萬一千九百四步爲實以一返步數一百二十四爲法除實得九十六卽自運土到數也又以古一到負土數二斗四升八合乘自運土到數得二百三十八

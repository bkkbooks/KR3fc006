body:
  text: 千五百九十二尺爲甲乙并袤以甲袤一千四百四十尺減之餘一千一百五十二尺卽乙袤也合問求丙丁草曰立天元一爲甲乙丙并袤依前入之得寄左然後併甲郡二萬二千三百二十人乙郡六萬八千七十六人丙郡五萬九千九百八十五人得一十五萬三百八十一人以常積尺數乘之得又以限日乘之得又以四乘之三除之得爲甲乙丙并積又六因之得又以本袤羃乘之深差乘廣差除之得下爲同數與左相消得開立方得三千一百六十八尺爲甲乙丙并袤以甲乙并袤二千五百九十二尺減之餘五百七十六尺卽丙袤也以甲乙丙并袤減本袤三千四百五十六尺餘二百八十八尺卽丁袤也合問求漘上廣術曰以程功乘總人又以限日

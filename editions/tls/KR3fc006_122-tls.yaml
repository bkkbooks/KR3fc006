body:
  text: 多少荅曰方徑各一丈六尺高一丈九尺深一丈四尺術曰三十五乘粟二十五而一爲率多自乘以并多少乘之以乘一十四如二十五而一所得以減率餘爲實并多少以乘多倍之乘一十四如二十五而一多自乘加之爲方法又并多少以乘一十四如二十五而一倍多加之爲廉法從開立方除之卽窖深各加差卽方徑高截高五尺壍徑及方二尺以深爲立方十四乘斛法故三十五乘粟多自乘并多少乘之爲截高隅積減率餘卽二方廉各二尺長五尺自外意旨皆與前同草曰立天元一爲深加方多於深二尺得爲方又爲徑又置方徑加少於倉高三尺得爲高乃以方徑自之得下式副置上下二位上位以十四乘之

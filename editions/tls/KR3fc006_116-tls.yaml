body:
  text: 十四段圓羃併二羃得以高乘之得爲十四方倉十四圓窖積寄左然後以斛法二尺五寸展爲二千五百寸乘粟二萬三千一百二十斛七斗三升得爲一方倉一圓窖積又以十四乘之得下爲同數與左相消得二十五約之得開立方得一百五十五寸卽高深也合問還元術曰倉方自乘以高乘之爲實圓徑自乘以深乘之一十一乘一十四而一爲實皆以斛法除之卽得容粟斛法二尺五寸草曰以倉方四十五尺三寸自乘得二千五十二尺九分以高一十五尺五寸乘之得三萬一千八百七尺三寸九分五釐以斛法二尺五寸除之得一萬二千七百二十二斛九斗五升八合卽倉容粟也又以圓徑四十六尺二寸自乘得二千一百三十四尺四寸四分以深一十五尺五寸乘
  hash: sha256:cedd8197584938543a35d51450470dc3917aa55ff335a0e0cfce35d4992b9974

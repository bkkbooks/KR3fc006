body:
  text: 南頭上廣三丈北頭上廣三丈六尺下廣二丈四尺袤七丈術曰以程功尺數乘二縣人又以限日乘之爲臺積又以上下袤差乘上下廣差三而一爲隅陽羃以乘截高爲隅陽截積羃又半上下廣差乘斬上袤爲隅頭羃以乘截高爲隅頭截積所得并二積以減臺積餘爲實以上下廣差并上下袤差半之爲正數加截上袤以乘截高所得增隅陽羃加隅頭羃爲方法又并截高及截上袤與正數爲廉法從開立方除之卽得上廣各加差得臺下廣及上下袤高草曰立天元一爲上廣加上下廣差二十尺得爲下廣又以天元加上廣袤差三十尺得爲上袤又以上袤加上下袤差四十尺得爲下袤又以天元加高多上廣一百一十尺得丨爲高乃以上袤倍之得加下袤得下以天
  hash: sha256:47be304cb967cd15f4c22d020f79b4e9aef6fd3d5ee2cb6b6019a7b875c6054e

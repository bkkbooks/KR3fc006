body:
  text: 六十分之九加之得爲弦自之得下爲弦羃又以天元自之得爲句羃以減弦羃得爲股羃以句羃乘之得寄左又以句股相乘羃七百六五十分之一卽百分之二自之得爲同數與左相消得開立方得一十四二十分之七卽百分之三十五卽句也合問假令有句股相乘羃四千三十六五分之一股少於弦六五分之一問弦多少荅曰弦一百一十四十分之七術曰羃自乘倍少數而一爲實半少爲廉法從開立方除之卽股加差卽弦草曰立天元一爲股以少於弦六五分之一卽十分之二加之得爲弦自之得下式爲弦羃以股自之得爲股羃以減弦羃得爲句羃以股羃乘之得寄左又以句股相乘羃四千三十六五分之一自之得爲同數與左

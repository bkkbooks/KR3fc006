body:
  text: 方除之卽乙袤餘放此此龍尾猶羨除也其壍堵一鼈臑一并而相連今以袤再乘積廣差乘高而一所得截鼈腝袤再自乘爲立方一又以一鼈腝截袤再自乘爲立方一又壍堵袤自乘爲羃三又三因末廣以袤乘之廣差而一與羃爲高故爲廉法求甲草曰立天元一爲甲袤合以廣差乘之本袤除之爲甲廣差今不乘除便以甲袤爲甲廣差率卽如以本袤乘甲廣差以廣差除之也又以本袤六十六尺乘下廣一十八尺以廣差六尺除之得爲甲下廣率以甲廣差率乘之得爲甲上廣率又天元甲袤合以本高乘之本袤除之爲甲高今不乘除便以甲袤爲甲高率卽如以本袤乘甲高以本高除之也乃倍甲下廣率得加甲上廣率得以甲高率乘之得下又以甲袤乘之得合以六除之又以廣差乘本高乘之以本袤羃除之爲甲隄積今不乘除便以爲甲積卽如六因甲積又以本袤羃乘之以廣差乘本高除之寄左也然後以常積一尺九寸八分乘甲

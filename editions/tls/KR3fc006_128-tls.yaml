body:
  text: 上方也合問假令有粟二萬六千三百四十二石四斗欲作方窖六圓窖四令口小底大方面與圓徑等其深亦同令深少於下方七尺多於上方一丈四尺盛各滿中而粟適盡圓率斛法竝與前同問上下方深數各多少荅曰方窖上方七尺下方二丈八尺深二丈一尺圓窖上下徑深與方窖同術曰以四十二乘斛法以乘粟三百八十四而一爲方亭積尺令方差自乘三而一爲隅陽羃以截多乘之以減積餘爲實以多乘差加羃爲方法又以多加差爲廉法從開立方除之卽上方加差卽合所問今以四十二乘圓虛十一者四方虛十四者六合一百二十八虛除之爲一虛之積得者仍三而一爲方亭實積乃依方亭見差覆問求之故三乘一百二十八除之
  hash: sha256:7256594e579d1f82d0b7d06cd819593c5f6588b1dc61ec79ef9d265fe2d04037

body:
  text: 粟積又以高羃乘之周差羃除之也寄左然後以斛法二尺五寸乘出粟二百六十六石四斗得爲出粟積又以分母三十六因之得又以高羃一千二百九十六尺乘之以周差羃一百四十四尺除之得爲同數與左相消得開立方得一十八尺卽粟去口也合問假令有粟二萬三千一百二十斛七斗三升欲作方倉一圓窖一盛各滿中而粟適盡令高深等使方面少於圓徑九寸多於高二丈九尺八寸率徑七周二十二問方徑深各多少荅曰倉方四丈五尺三寸容粟一萬二千七百二十二斛九斗五升八合窖徑四丈六尺二寸容粟一萬三百九十七石七斗七升二合高與深各一丈五尺五寸求方徑高深術曰十四乘斛法以乘粟數
  hash: sha256:ab1fb4216ffff448f5aaa54cbaa61142d355499a13c97e2d18bc19ee431e192b

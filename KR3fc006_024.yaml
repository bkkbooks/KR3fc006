body:
  text: 高合以袤差乘之本高而一爲乙袤差今不乘除便以乙高爲乙袤差率卽如以本高乘乙袤差以袤差除之也又以本高一百八十尺乘上廣七十尺以廣差二十尺除之得爲上廣率以乙廣差率加之得爲乙下廣率又以本高一百八十尺乘上袤一百尺以袤差四十尺除之得爲上袤率以乙袤差率加之得爲乙下袤率乃倍上袤率得加乙下袤率得以上廣率乘之得下於頭又倍乙下袤率得加上袤率得以乙下廣率乘之得下加入頭位得以天元乙高乘之得此數合以六除之又以廣差乘袤差乘之本高羃除之爲乙積今不乘除便以爲乙積卽如六因乙積又以本高羃乘之以廣差乘袤差寄左除之也然後以常積七十五尺乘乙縣三千二百二十二人得又以限日五乘之得爲乙積又以六因之得又以

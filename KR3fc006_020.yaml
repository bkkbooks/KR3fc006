body:
  text: 元上廣乘之得下於頭又以下袤倍之得加上袤得下式以下廣乘之得下式併入頭位得又以高乘之得下式合以六除之為臺積今不除便為帶分臺積內寄六為母寄左然後以甲縣一千四百一十八人乙縣三千二百二十二人併之得以常積七十五尺乘之得又以限日五乘之得為臺積又以分母六乘之得為同數與左相消得上下俱半之得下開立方得七十尺即上廣也各加差得下廣及上下袤高合問求均給積尺受廣袤術曰以程功尺數乘乙縣人又以限日乘之為乙積三因之又以高羃乘之以上下廣差乘袤差而一為實又以臺高乘上廣廣差而一為上廣之高又以臺高乘上袤袤差而一為上袤之高又以上廣之高乘上袤之高三之為方
  hash: sha256:e66088bf8946c29cea5c27beb15fdd4c0dd08c1f16fa9cafc06b86a4a5444837

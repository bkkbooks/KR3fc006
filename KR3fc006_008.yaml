body:
  text: 唐通直郎太史丞臣王孝通𢰅并注張敦仁𢰅細草假令天正十一月朔夜半日在斗十度七百分度之四百八十以章歲為母朔月行定分九千朔日定小餘一萬日法二萬章歲七百亦名行分也今不取加時度問天正朔夜半之時月在何處推朔夜半月度舊術要須加時日度自古先儒雖復修𢰅改制意見甚衆並未得算妙有理不盡考校尤難臣每日夜思量常以此理屈滯恐後代無人知者今奉敕造歷因即改制為此新術舊推日度之術已得朔夜半日度仍須更求加時日度然知月處臣今作新術但得朔夜半日度不須加時日度即知月處此新術比於舊術一年之中十二倍省功使學者易知答曰在斗四度七百分度之五百三十術曰推朔夜半月度新術不復加時日度月蝕乃可用之以章歲減朔月行定分餘以乘朔日定小餘滿日法而一為先行分不盡者半法已上收成一已下者棄之若先行分滿日行分而一為

body:
  text: 袤差乘之窖深除之爲甲袤差今不乘除便以甲深爲甲袤差率卽如以窖深乘甲袤差以袤差除之也又以窖深三十尺乘上袤九十尺以袤差三十尺除之得爲甲上袤率以甲袤差率加之得爲甲下袤率乃倍甲上廣率得加甲下廣率得以甲上袤率乘之得於上又倍甲下廣率得下加甲上廣率得以甲下袤率乘之得加入上位得以甲深乘之得下式可半先半之得下合以三除之又以廣差乘袤差乘之深羃除之爲甲積今不乘除便以爲甲積卽如三因甲積又以深羃乘寄左之以廣差乘袤差除之也然後以斛法二尺五寸乘甲郡三萬八千七百四十五石六斗得爲甲積又三因之得又以深羃九百尺乘之廣差乘袤差得六百尺除之得爲同數與左相消得開立方得一十二尺卽甲深也

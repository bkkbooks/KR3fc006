body:
  text: 甲縣鄉人給高九丈上廣三丈下廣二丈四尺上袤七丈下袤一十四丈乙縣鄉人給高九丈上廣三丈六尺下廣三丈下袤七丈敦仁案羡道共積三十五萬二千八百尺甲一十三鄉應受積八萬一千九百尺乙四十三鄉應受積二十七萬九百尺今以此兩縣高廣袤各依術求之甲得積二十五萬二千尺乙得積一十萬八百尺各如常積六千三百尺而一得甲縣四十鄉乙縣一十六鄉與問數不合元和李氏鋭曰此甲乙二縣鄉人別給羡道據問數術文甲當在南乙當在北據答數則甲道在下乙道在上兩者差異不可立法詳尋其義當以問數術文為正其答宜云甲縣鄉人給高九丈上廣三丈下廣二丈四尺袤七丈乙縣鄉人給南頭高九丈北頭高一十八丈
  hash: sha256:8ff7bed40d4b3b6e398e40423ac0f99d6454cc98fa2254f871bdf1f18d5dfc9a

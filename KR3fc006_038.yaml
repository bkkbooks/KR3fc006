body:
  text: 以穿方一尺土數除之得一人一日運功積又以一人穿土九石九斗二升以穿方一尺土數除之為法除之得穿用人數復置運功積以每人一日常積除之得築用人數并之得六人共成二十九尺七寸六分以六人除之即一人程功也草曰置山高三十步四之三而一得四十為上山步又置山高步五之六而一得二十五為下山步又置水寬一十二步倍之得二十四為渡水步併三步得八十九步加平道一十一步得一百步踟𨆼之間十加一得一百一十步又加載輸一十四步共得一百二十四為一返步又以古人負土平道行一百九十二步乘一日到數六十二得一萬一千九百四步為實以一返步數一百二十四為法除實得九十六即自運土到數也又以古一到負土數二斗四升八合乘自運土到數得二百三十八
  hash: sha256:d6a2e7e51aa8d79c20a354613a584ecdbdd92722ec9c7ae6cb8998e40a08cb58

body:
  text: 乘除便以為甲積即如六因甲積又以本袤羃乘之以深差乘廣差除寄左之也然後以常積三尺七寸二分乘甲郡二萬二千三百二十人得又以限日九十六乘之得又以寄率四乘之築率三除之得為甲積又六因之得又以本袤羃一千一百九十四萬三千九百三十六尺乘之以深差乘廣差得九萬九千六百三十六尺四寸八分除之得為同數與左相消得開立方得一千四百四十尺即甲袤也合問求乙草曰立天元一為甲乙并袤依前入之得寄左然後併甲郡二萬二千三百二十人乙郡六萬八千七十六人得九萬三百九十六人以常積尺數乘之得又以限日乘之得又以四乘之三除之得為甲乙并積又六因之得以本袤羃乘之深差乘廣差除之得為同數與左相消得開立方得二

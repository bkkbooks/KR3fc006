body:
  text: 合問求乙草曰立天元一為甲乙并深依前入之得寄左然後併甲郡三萬八千七百四十五石六斗乙郡三萬四千九百五石六斗得七萬三千六百五十一石二斗以斛法乘之得為甲乙并積又三因之得又以深羃乘之廣差乘袤差除之得為同數與左相消得開立方得二十一尺為甲乙并深以甲深一十二尺減之餘九尺即乙深也合問求丙丁草曰立天元一為甲乙丙并深依前入之得寄左然後併甲郡三萬八千七百四十五石六斗乙郡三萬四千九百五石六斗丙郡二萬六千二百七十石四斗得九萬九千九百二十一石六斗以斛法乘之得為甲乙丙并積又三因之得又以深羃乘之廣差乘袤差除之得為同數與左相消得開

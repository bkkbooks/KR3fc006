body:
  text: 南頭上廣三丈北頭上廣三丈六尺下廣二丈四尺袤七丈術曰以程功尺數乘二縣人又以限日乘之為臺積又以上下袤差乘上下廣差三而一為隅陽羃以乘截高為隅陽截積羃又半上下廣差乘斬上袤為隅頭羃以乘截高為隅頭截積所得并二積以減臺積餘為實以上下廣差并上下袤差半之為正數加截上袤以乘截高所得增隅陽羃加隅頭羃為方法又并截高及截上袤與正數為廉法從開立方除之即得上廣各加差得臺下廣及上下袤高草曰立天元一為上廣加上下廣差二十尺得為下廣又以天元加上廣袤差三十尺得為上袤又以上袤加上下袤差四十尺得為下袤又以天元加高多上廣一百一十尺得丨為高乃以上袤倍之得加下袤得下以天
  hash: sha256:e8ca63d8ec5ad512c948192eb267499ece68b5d0f745755ba57d0bbac4ffc2a9

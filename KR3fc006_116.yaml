body:
  text: 十四段圓羃併二羃得以高乘之得為十四方倉十四圓窖積寄左然後以斛法二尺五寸展為二千五百寸乘粟二萬三千一百二十斛七斗三升得為一方倉一圓窖積又以十四乘之得下為同數與左相消得二十五約之得開立方得一百五十五寸即高深也合問還元術曰倉方自乘以高乘之為實圓徑自乘以深乘之一十一乘一十四而一為實皆以斛法除之即得容粟斛法二尺五寸草曰以倉方四十五尺三寸自乘得二千五十二尺九分以高一十五尺五寸乘之得三萬一千八百七尺三寸九分五釐以斛法二尺五寸除之得一萬二千七百二十二斛九斗五升八合即倉容粟也又以圓徑四十六尺二寸自乘得二千一百三十四尺四寸四分以深一十五尺五寸乘
  hash: sha256:8c2f34bc71e58a09cbe47b137b6ad76dc7377e6301e6bb545d45818a7fd7eab1

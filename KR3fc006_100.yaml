body:
  text: 得大高自乘之數小高亦然凡大高者即是取高於小高并相連今大高自乘為大方大方之內即有取高自乘羃一隅頭小高自乘羃一又其兩邊各一以取高乘小高為羃二又大小高相乘為中方中方之內即有小高乘取高羃一又小高自乘即是小方之羃又一則小高乘大高又各自乘三等羃皆以乘取高為立積故三因小羃為方及三小高為廉也草曰立天元一為出粟高合以方差乘之本高而一為出粟方差今不乘除便以出粟高為出粟方差率即如以本高乘出粟方差以方差除之也又以本高一十二尺乘上方三尺以方差六尺除之得丅為上方率以出粟方差率加之得為下方率乃以上方率自乘得下方率自乘得上下方率相乘得以三位併之得下又以出粟高乘之得此數合以三除之又以方差羃乘之本高羃而一為出粟積今不乘除便以為帶分出粟積即如以三因出粟積又以本高羃乘寄左之以方差羃除之也然後以斛法二尺五寸乘出粟五十石四斗得為出粟

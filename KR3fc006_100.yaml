body:
  text: 得大高自乘之數小高亦然凡大高者卽是取高於小高并相連今大高自乘爲大方大方之內卽有取高自乘羃一隅頭小高自乘羃一又其兩邊各一以取高乘小高爲羃二又大小高相乘爲中方中方之內卽有小高乘取高羃一又小高自乘卽是小方之羃又一則小高乘大高又各自乘三等羃皆以乘取高爲立積故三因小羃爲方及三小高爲廉也草曰立天元一爲出粟高合以方差乘之本高而一爲出粟方差今不乘除便以出粟高爲出粟方差率卽如以本高乘出粟方差以方差除之也又以本高一十二尺乘上方三尺以方差六尺除之得丅爲上方率以出粟方差率加之得爲下方率乃以上方率自乘得下方率自乘得上下方率相乘得以三位併之得下又以出粟高乘之得此數合以三除之又以方差羃乘之本高羃而一爲出粟積今不乘除便以爲帶分出粟積卽如以三因出粟積又以本高羃乘寄左之以方差羃除之也然後以斛法二尺五寸乘出粟五十石四斗得爲出粟

body:
  text: 廣差乘甲袤本袤而一以下廣加之即甲上廣又以臺高乘甲袤本袤除之即甲高草曰立天元一為甲袤合以廣差乘之本袤除之為甲廣差今不乘除便以甲袤為甲廣差率即如以本袤乘甲廣差以廣差除之也又以本袤一百四十尺乘下廣二十四尺以廣差一十二尺除之得為下廣率以甲廣差率加之得為甲上廣率又天元甲袤合以本高乘之本袤除之為甲高今不乘除便以甲袤為甲高率即如以本袤乘甲高以本高除之也乃倍下廣率得加甲上廣率得以甲袤乘之得下式又以甲高率乘之得合以六除之又以廣差乘本高乘之以本袤羃除之為甲積今不乘除便以為甲積即如六因甲積又以本袤羃乘之以廣差乘本高除之也寄左然後以常積六千三百尺乘甲縣一十三鄉得為甲積又六因之得又以本袤羃一萬九千六百尺乘之以廣差乘
  hash: sha256:b048f1b91bf6246e4e23bea5775a468a8c1f0f258b5f88a1e2ad3267f7ee417a

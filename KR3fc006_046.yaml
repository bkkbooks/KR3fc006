body:
  text: 卽甲袤又以下廣差乘之所得以正袤除之所得加東頭下廣卽甲廣又以兩頭高差乘甲袤以正袤除之以加東頭高卽甲高又以甲袤自乘以隄東頭高減甲高餘自乘并二位以開方除之卽得斜袤求高廣以本袤及高廣差求之若求乙丙丁各以本縣人功積尺每以前大高廣爲後小高廣凡廉母自乘爲方母廉母乘方母爲實母此平隄在上羨除在下兩高之差卽除高其餘兩邊各一鼈腝中一壍堵今以袤再乘積廣差乘袤差而一得截鼈腝袤再乘爲立方一又壍堵袤自乘爲羃三又三因小頭下廣大袤乘之廣差而一與羃爲高故爲廉法又并小頭上下廣又三之意同六除然此頭羃本乘截袤又袤乘之差相乘而一今還依數乘除一頭羃爲從得截袤爲廣草曰立天元一爲甲袤合以高差乘之本袤除之爲甲高差今不乘除便以甲袤爲甲高差率卽如以本袤乘甲高差以高差除之也又以本袤四百八十尺乘東頭高三尺一寸以高差三十一尺除之得四十八尺爲東頭高率

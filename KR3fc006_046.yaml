body:
  text: 即甲袤又以下廣差乘之所得以正袤除之所得加東頭下廣即甲廣又以兩頭高差乘甲袤以正袤除之以加東頭高即甲高又以甲袤自乘以隄東頭高減甲高餘自乘并二位以開方除之即得斜袤求高廣以本袤及高廣差求之若求乙丙丁各以本縣人功積尺每以前大高廣為後小高廣凡廉母自乘為方母廉母乘方母為實母此平隄在上羡除在下兩高之差即除高其餘兩邊各一鱉腝中一塹堵今以袤再乘積廣差乘袤差而一得截鱉腝袤再乘為立方一又塹堵袤自乘為羃三又三因小頭下廣大袤乘之廣差而一與羃為高故為廉法又并小頭上下廣又三之意同六除然此頭羃本乘截袤又袤乘之差相乘而一今還依數乘除一頭羃為從得截袤為廣草曰立天元一為甲袤合以高差乘之本袤除之為甲高差今不乘除便以甲袤為甲高差率即如以本袤乘甲高差以高差除之也又以本袤四百八十尺乘東頭高三尺一寸以高差三十一尺除之得四十八尺為東頭高率

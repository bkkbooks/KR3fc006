body:
  text: 差即方徑一十四乘斛法以乘粟為徑自乘及方自乘數與前同今方倉四即四因十四圓窖三即三因十一并之為八十九而一此塹徑一丈五尺塹方五尺以高為立方自外意同前草曰立天元一為高又為深加方面多於高五尺得為方面又置方面加方面少於圓徑一十尺得為圓徑乃以方面自之得以十四乘之得又以倉數四乘之得於頭又以圓徑自之得以十一乘之得又以窖數三乘之得併入頭位得以高深乘之得下式寄左然後以斛法二尺五寸乘粟一萬六千三百四十八石八斗得以十四乘之得為同數與左相消得下開立方得一十三尺即高深也合問假令有粟三千七十二石欲作方倉一圓窖一令徑與方等方多於窖深二尺少於倉高三尺盛各滿中而粟適盡圓率斛法並與前同問方徑高深各

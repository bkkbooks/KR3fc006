body:
  text: 之得三萬三千八十三尺八寸二分又以一十一乘之得三十六萬三千九百二十二尺二分以一十四乘斛法二尺五寸得三十五尺除之得一萬三百九十七石七斗七升二合即窖容粟也合問假令有粟一萬六千三百四十八石八斗欲作方倉四圓窖三令高深等方面少於圓徑一丈多於高五尺斛法二尺五寸率徑七周二十二問方高徑各多少答曰方一丈八尺高深一丈三尺圓徑二丈八尺術曰以一十四乘斛法以乘粟數如八十九而一為實倍多加少以乘少數三十三乘之八十九而一多自乘加之為方法又倍少數以三十三乘之八十九而一倍多加之為廉法從開立方除之即高深各加

body:
  text: 石六斗丙郡輸粟二萬六千二百七十石四斗丁郡輸粟一萬四千七十八石四斗四郡𠔏穿窖上袤多於上廣一丈少於下袤三丈多於深六丈少於下廣一丈各計粟多少均出丁夫自穿負築冬程人功常積一十二尺一日役問窖上下廣袤深郡別出人及窖深廣各多少荅曰窖上廣八丈上袤九丈下廣一十丈下袤一十二丈深三丈甲郡八千七十二人深一十二尺下袤一十丈二尺廣八丈八尺乙郡七千二百七十二人深九尺

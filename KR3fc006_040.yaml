body:
  text: 斗八合以穿方一尺土數八斗除之得二十九尺七寸六分爲一人一日運功積又置一人穿土數九石九斗二升以穿方一尺土數八斗除之得一十二尺四寸以除運功積得二人四分爲穿用人數又置運功積二十九尺七寸六分以分母十三通之得三萬八千六百八十八分以每人一日常積一十一尺四寸十三分寸之六通分內子得一千四百八十八分除之得二人六分爲築用人數併運用一人穿用二人四分築用二人六分得六人以除運功積得四尺九寸六分卽一人程功也合問求隄上下廣及高袤術曰一人一日程功乘總人爲隄積以高差乘下廣差六而一爲鼈羃又以高差小頭廣差二而一爲大臥壍頭羃又半高差乘上廣多東頭高之數爲小臥壍頭羃并三羃爲大小壍鼈率乘正袤多小高之數以減隄積餘爲實又
  hash: sha256:ab6a54b313ad7b4938c3d1f5aaadef7a39dc6a2ff330ca4210869fd371885d47

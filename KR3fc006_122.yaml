body:
  text: 多少答曰方徑各一丈六尺高一丈九尺深一丈四尺術曰三十五乘粟二十五而一為率多自乘以并多少乘之以乘一十四如二十五而一所得以減率餘為實并多少以乘多倍之乘一十四如二十五而一多自乘加之為方法又并多少以乘一十四如二十五而一倍多加之為廉法從開立方除之即窖深各加差即方徑高截高五尺塹徑及方二尺以深為立方十四乘斛法故三十五乘粟多自乘并多少乘之為截高隅積減率餘即二方廉各二尺長五尺自外意旨皆與前同草曰立天元一為深加方多於深二尺得為方又為徑又置方徑加少於倉高三尺得為高乃以方徑自之得下式副置上下二位上位以十四乘之

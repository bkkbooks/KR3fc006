body:
  text: 草曰立天元一為上方依前術入之得下為方窖積寄左然後以斛法二尺五寸乘粟二萬六千三百四十二石四斗得又以方率十四乘之以六因方率十四四因圓率十一併之得一百二十八除之得為如積與左相消所得實從廉隅竝同前術假令有句股相乘羃七百六五十分之一弦多於句三十六十分之九問三事各多少答曰句十四二十分之七股四十九五分之一弦五十一四分之一術曰羃自乘倍多數而一為實半多數為廉法從開立方除之即句以弦多數加之即弦以句除羃即股句股相乘羃自乘即句羃乘股羃之積故以倍句弦差而一得一句與半差再乘得句羃為方故半差為廉從開立方除之草曰立天元一為句又以弦多於句三十

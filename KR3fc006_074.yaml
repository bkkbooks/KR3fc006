body:
  text: 廣差率即如以本袤乘甲廣差以廣差除之也又置北頭上廣十二步二尺四寸通之得七十四尺四寸以本袤乘之又置南頭上廣八十六步四尺八寸通之得五百二十尺八寸以北頭上廣尺數減之餘四百四十六尺四寸為廣差除之得為甲北頭上廣率以甲廣差率加之得下為甲南頭上廣率又置下廣六步一尺二寸通之得三十七尺二寸以本袤乘之廣差除之得為甲下廣率乃倍甲北頭深率得加甲南頭深率得於上以甲北頭上廣率加甲下廣率得下半之得以乘上得列頭位又倍甲南頭深率得加甲北頭深率得於上以甲南頭上廣率加甲下廣率得下半之得以乘上得併頭位得又以甲袤乘之得下式合以六除之又以深差乘廣差乘之本袤羃除之為甲積今不
  hash: sha256:ed31e6c82976d2f5fc403b5062e629c4aa60d21e0e0d88b568c17d07f29ffab1

body:
  text: 頭高率得於上以上廣率加東下廣率而半之得下以乘上得以併入頭位得下又以天元甲袤乘之得合以六除之又以高差乘下廣差乘之本袤羃除之又以分母三十一除之為甲積今不乘除便為帶分甲積即如六因甲積又以本袤羃乘之以高差乘寄寄左廣差除之又以分母三十一乘之也然後以甲縣六千七百二十四人乘程功四尺九寸六分得為甲隄積又六因之得又以本袤羃二十三萬四百尺乘之以高差乘下廣差得一千九百二十二尺除之得二千三百九十八萬七千七百六十一尺一千九百二十二分尺之一千五十四約為三十一分尺之一十七以分母三十一乘之得為同數與左相消得下開立方得一百九十二尺即甲袤也餘各依術入之合問求乙草曰立天元一為甲乙并袤依前入

body:
  text: 積又以分母三因之得又以本高羃一百四十四尺乘之如方差羃三十六尺而一得為同數與左相消得開立方得六尺為出粟高以減本高餘六尺即餘粟高也合問假令芻甍上袤三丈下袤九丈廣六丈高一十二丈有甲縣六百三十二人乙縣二百四十三人夏程人功常積三十六尺限八日役自穿築二縣共造今甲縣先到問自下給高廣袤各多少答曰高四丈八尺上廣三丈六尺袤六丈六尺求甲縣均給積尺受廣袤術曰以程功乘乙縣人數又以限日乘之為積尺以六因之又高羃乘之又袤差乘廣而一所得又半之為實高乘上袤袤差而一為上袤之
  hash: sha256:04b33e658af87941703e655a5c6577f1dac6e45c6eadfdf3be844827a8d56859

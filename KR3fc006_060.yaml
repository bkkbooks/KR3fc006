body:
  text: 上廣二丈一尺乙縣高二丈一尺袤一丈三尺二寸上廣二丈二尺二寸丙縣高三丈袤一丈九尺八寸上廣二丈四尺求龍尾隄廣袤高術曰以程功乘總人為隄積又六因之為虛積以少高乘少袤為隅羃以少上廣乘之為鱉隅羃以減虛積餘三約之所得為實并少高袤以少上廣乘之為鱉從橫廉羃三而一加隅羃為方法又三除少上廣以少袤少高加之為廉法從開立方除之得下廣加差即高廣袤草曰立天元一為下廣加上下廣差六尺得為上廣又以下廣少高一十二尺加下廣得一為高又以下廣少袤四十八尺加下廣得為袤乃倍下廣得下

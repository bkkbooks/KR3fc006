body:
  text: 乘之爲積六因之爲實以正袤除之又以高除之所得以下廣減之餘又半之卽漘上廣草曰以程功三尺七寸二分乘四郡總一十八萬八千三百二十五人得七十萬五百六十九尺又以限日九十六乘之得六千七百二十五萬四千六百二十四尺爲積六因之得四億三百五十二萬七千七百四十四尺爲實以正袤三千四百五十六尺除之得一十一萬六千七百六十一尺五寸又以高二百二十三尺二寸除之得五百二十三尺一寸二分五釐以下廣四百六尺七寸五釐減之餘一百一十六尺四寸二分半之得五十八尺二寸一分卽漘上廣也合問假令四郡輸粟斛法二尺五寸一人作功爲均自上給甲以次與乙其甲郡輸粟三萬八千七百四十五石六斗乙郡輸粟三萬四千九百五
  hash: sha256:8e506ce70dec5617b980f8b33db1fca03ee5b7254193f70784c265c338f11f98

body:
  text: 六十分之九加之得為弦自之得下為弦羃又以天元自之得為句羃以減弦羃得為股羃以句羃乘之得寄左又以句股相乘羃七百六五十分之一即百分之二自之得為同數與左相消得開立方得一十四二十分之七即百分之三十五即句也合問假令有句股相乘羃四千三十六五分之一股少於弦六五分之一問弦多少答曰弦一百一十四十分之七術曰羃自乘倍少數而一為實半少為廉法從開立方除之即股加差即弦草曰立天元一為股以少於弦六五分之一即十分之二加之得為弦自之得下式為弦羃以股自之得為股羃以減弦羃得為句羃以股羃乘之得寄左又以句股相乘羃四千三十六五分之一自之得為同數與左

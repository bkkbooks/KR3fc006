body:
  text: 或問第二術羨道均給積尺今以問數術文爲正定爲甲道在南乙道在北矣若依荅數甲道在下乙道在上亦可求其數乎曰以立天元術言之則當先求乙也其法立天元一爲乙袤卽以爲乙廣差率又以爲乙高率又以本袤乘上廣以廣差除之得上廣率以乙廣差率減之餘爲乙下廣率依術入之得寄左數又以乙縣一十六鄉求得同數與左相消半之得二百七十四萬四千爲負實六百三十爲正廉一負隅開立方得七十尺然緝古通例相消以前無負算是以知其必不然也癸亥閏月淸明日敦仁記
  hash: sha256:95065db5b8b3a9179ece06b9a07381aaf7dbf3f656cd697f5de17abfc9cc05d9

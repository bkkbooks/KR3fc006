body:
  text: 或問第二術羡道均給積尺今以問數術文為正定為甲道在南乙道在北矣若依答數甲道在下乙道在上亦可求其數乎曰以立天元術言之則當先求乙也其法立天元一為乙袤即以為乙廣差率又以為乙高率又以本袤乘上廣以廣差除之得上廣率以乙廣差率減之餘為乙下廣率依術入之得寄左數又以乙縣一十六鄉求得同數與左相消半之得二百七十四萬四千為負實六百三十為正廉一負隅開立方得七十尺然緝古通例相消以前無負算是以知其必不然也癸亥閏月淸明日敦仁記
  hash: sha256:84cf5990fd0e42da87135d97649b88dedd8f686c2b3fea397814ae8f7441ba0a

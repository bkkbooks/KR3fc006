body:
  text: 置半高差及半小頭廣差與上廣多小頭高之數并三差以乘正袤多小頭高之數以加率為方法又并正袤多小高并上廣多小高及半高差而增之兼半小頭廣差加之為廉法從開立方除之即小高加差即各得廣袤高又正袤自乘高差自乘并而開方除之即斜袤敦仁案又以高差下脫乘字草曰立天元一為東頭高加東頭高少於西頭高三十一尺得為西頭高又置天元加上廣多東頭高四尺九寸得為上廣又置天元加正袤多於東頭高四百七十六尺九寸得為正袤又置上廣加西頭廣差六十八尺二寸得為西頭下廣又置上廣加東頭廣差六尺二寸得為東頭下廣乃倍東頭高加西頭高得下併東頭上下廣得半之得乘之得於上又倍西頭高得下式加東頭高得併西頭
